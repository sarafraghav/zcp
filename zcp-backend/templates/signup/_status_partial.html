{% if status == "failed" or status == "terminated" or status == "timed_out" %}
  <div class="card">
    <div class="flex items-start gap-4">
      <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5"
           style="background:var(--e-bg);border:1px solid var(--e-bd)">
        <svg class="w-4 h-4" style="color:var(--e-tx)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </div>
      <div>
        <p class="text-sm font-semibold text-main">Provisioning failed</p>
        <p class="text-sm text-muted mt-0.5">Please try again or contact support.</p>
      </div>
    </div>
  </div>
{% else %}
  <div
    hx-get="{% url 'signup-status' workflow_id %}"
    hx-trigger="every 2s"
    hx-swap="outerHTML"
    class="card"
  >
    <!-- Status header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2.5">
        <svg class="animate-spin h-4 w-4 flex-shrink-0 text-accent" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
        <span class="text-sm font-medium text-main">Provisioning…</span>
      </div>
      <span class="font-mono text-xs text-muted">{{ status }}</span>
    </div>

    <!-- Steps -->
    <ol class="space-y-3">
      <li class="flex items-center gap-3">
        <div class="w-4 h-4 rounded-full flex-shrink-0" style="background:var(--accent-10);border:2px solid var(--accent)"></div>
        <span class="text-sm text-main">Organization</span>
      </li>
      <li class="flex items-center gap-3">
        <div class="w-4 h-4 rounded-full flex-shrink-0" style="background:var(--surface-2);border:2px solid var(--border)"></div>
        <span class="text-sm text-muted">Modal Volume</span>
      </li>
      <li class="flex items-center gap-3">
        <div class="w-4 h-4 rounded-full flex-shrink-0" style="background:var(--surface-2);border:2px solid var(--border)"></div>
        <span class="text-sm text-muted">Neon Database</span>
      </li>
      <li class="flex items-center gap-3">
        <div class="w-4 h-4 rounded-full flex-shrink-0" style="background:var(--surface-2);border:2px solid var(--border)"></div>
        <span class="text-sm text-muted">Upstash Redis</span>
      </li>
      <li class="flex items-center gap-3">
        <div class="w-4 h-4 rounded-full flex-shrink-0" style="background:var(--surface-2);border:2px solid var(--border)"></div>
        <span class="text-sm text-muted">Deploy App</span>
      </li>
    </ol>
  </div>
{% endif %}

<style>
  /* ============================================================
     ZCP THEME SYSTEM — 4 themes: dark-tech | light-clean | midnight | carbon
     All templates reference these vars via semantic CSS classes.
     Tailwind is used for layout/spacing only.
     ============================================================ */

  /* --- dark-tech (default) --- */
  :root,
  [data-theme="dark-tech"] {
    --bg:        #030712;
    --surface:   #0f172a;
    --surface-2: #1e293b;
    --border:    #334155;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --accent:    #10b981;
    --accent-h:  #059669;
    --accent-10: rgba(16,185,129,.10);
    --accent-25: rgba(16,185,129,.25);
    --s-bg: rgba(16,185,129,.12); --s-bd: #047857; --s-tx: #34d399;
    --w-bg: rgba(245,158,11,.12); --w-bd: #92400e; --w-tx: #fbbf24;
    --e-bg: rgba(244,63,94,.12);  --e-bd: #9f1239; --e-tx: #fb7185;
    --code-bg:   #020617;
    --code-tx:   #34d399;
    --shadow:    none;
  }

  /* --- light-clean --- */
  [data-theme="light-clean"] {
    --bg:        #f8fafc;
    --surface:   #ffffff;
    --surface-2: #f1f5f9;
    --border:    #e2e8f0;
    --text:      #0f172a;
    --muted:     #64748b;
    --accent:    #4f46e5;
    --accent-h:  #4338ca;
    --accent-10: rgba(79,70,229,.08);
    --accent-25: rgba(79,70,229,.22);
    --s-bg: #ecfdf5;  --s-bd: #6ee7b7; --s-tx: #047857;
    --w-bg: #fffbeb;  --w-bd: #fcd34d; --w-tx: #92400e;
    --e-bg: #fff1f2;  --e-bd: #fda4af; --e-tx: #9f1239;
    --code-bg:   #1e293b;
    --code-tx:   #a5f3fc;
    --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  }

  /* --- midnight --- */
  [data-theme="midnight"] {
    --bg:        #08081e;
    --surface:   #0e0e2a;
    --surface-2: #1a1a3a;
    --border:    #2a2a5a;
    --text:      #e2e0ff;
    --muted:     #7070aa;
    --accent:    #a78bfa;
    --accent-h:  #8b5cf6;
    --accent-10: rgba(167,139,250,.10);
    --accent-25: rgba(167,139,250,.25);
    --s-bg: rgba(52,211,153,.10); --s-bd: #065f46; --s-tx: #6ee7b7;
    --w-bg: rgba(251,191,36,.10); --w-bd: #78350f; --w-tx: #fde68a;
    --e-bg: rgba(244,63,94,.10);  --e-bd: #9f1239; --e-tx: #fda4af;
    --code-bg:   #05051a;
    --code-tx:   #c4b5fd;
    --shadow:    none;
  }

  /* --- carbon --- */
  [data-theme="carbon"] {
    --bg:        #0a0a0a;
    --surface:   #141414;
    --surface-2: #1f1f1f;
    --border:    #2e2e2e;
    --text:      #e5e5e5;
    --muted:     #666666;
    --accent:    #f97316;
    --accent-h:  #ea580c;
    --accent-10: rgba(249,115,22,.10);
    --accent-25: rgba(249,115,22,.25);
    --s-bg: rgba(34,197,94,.10); --s-bd: #166534; --s-tx: #86efac;
    --w-bg: rgba(234,179,8,.10); --w-bd: #854d0e; --w-tx: #fef08a;
    --e-bg: rgba(239,68,68,.10); --e-bd: #991b1b; --e-tx: #fca5a5;
    --code-bg:   #050505;
    --code-tx:   #fb923c;
    --shadow:    none;
  }

  /* ============================================================
     BASE
     ============================================================ */
  body {
    background-color: var(--bg);
    color: var(--text);
  }

  /* ============================================================
     CARDS
     ============================================================ */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    padding: 1.5rem;
    box-shadow: var(--shadow, none);
  }
  .card-flush {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    overflow: hidden;
    box-shadow: var(--shadow, none);
  }

  /* ============================================================
     NAVIGATION
     ============================================================ */
  .nav-link {
    color: var(--muted);
    border-radius: 0.375rem;
    padding: 0.375rem 0.75rem;
    font-size: 0.75rem;
    font-weight: 500;
    transition: color 0.15s, background 0.15s;
    display: inline-block;
    cursor: pointer;
    background: none;
    border: none;
  }
  .nav-link:hover { color: var(--text); background: var(--surface-2); }
  .nav-link-accent {
    background: var(--accent-10);
    border: 1px solid var(--accent-25);
    color: var(--accent);
    border-radius: 0.5rem;
    padding: 0.25rem 0.75rem;
    font-size: 0.75rem;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s;
    display: inline-block;
  }
  .nav-link-accent:hover { background: var(--accent-25); border-color: var(--accent); }

  /* ============================================================
     BUTTONS
     ============================================================ */
  .btn-primary {
    background: var(--accent-10);
    border: 1px solid var(--accent-25);
    color: var(--accent);
    border-radius: 0.5rem;
    padding: 0.625rem 1rem;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    line-height: 1.25;
  }
  .btn-primary:hover { background: var(--accent-25); border-color: var(--accent); }
  .btn-sm { font-size: 0.7rem; padding: 0.3rem 0.75rem; }

  /* ============================================================
     FORM FIELDS
     ============================================================ */
  .input-field {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 0.5rem;
    padding: 0.5rem 0.75rem;
    font-size: 0.875rem;
    width: 100%;
    display: block;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-field:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-10);
  }
  .input-field::placeholder { color: var(--muted); opacity: 1; }
  .input-field.has-error { border-color: var(--e-bd); }

  .textarea-field {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 0.5rem;
    padding: 0.625rem 0.75rem;
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    width: 100%;
    resize: vertical;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .textarea-field:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-10);
  }
  .textarea-field::placeholder { color: var(--muted); opacity: 1; }

  .select-field {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 0.5rem;
    padding: 0.375rem 0.625rem;
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    transition: border-color 0.15s;
  }
  .select-field:focus { outline: none; border-color: var(--accent); }

  /* ============================================================
     BADGES
     ============================================================ */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 0.125rem 0.625rem;
    border-radius: 9999px;
    font-size: 0.7rem;
    font-weight: 500;
    border: 1px solid;
    white-space: nowrap;
  }
  .badge-success { background: var(--s-bg); border-color: var(--s-bd); color: var(--s-tx); }
  .badge-warn    { background: var(--w-bg); border-color: var(--w-bd); color: var(--w-tx); }
  .badge-error   { background: var(--e-bg); border-color: var(--e-bd); color: var(--e-tx); }
  .badge-neutral { background: var(--surface-2); border-color: var(--border); color: var(--muted); }

  /* ============================================================
     CODE / MONO ELEMENTS
     ============================================================ */
  .code-chip {
    display: inline-block;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 0.25rem;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    vertical-align: middle;
  }
  .code-block {
    background: var(--code-bg);
    color: var(--code-tx);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    border-radius: 0.5rem;
    padding: 0.875rem 1rem;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    border: 1px solid var(--border);
    line-height: 1.6;
  }

  /* ============================================================
     ALERTS
     ============================================================ */
  .alert-error {
    background: var(--e-bg);
    border: 1px solid var(--e-bd);
    color: var(--e-tx);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    font-size: 0.75rem;
  }

  /* ============================================================
     TABLES
     ============================================================ */
  .result-row:nth-child(even) { background: var(--surface-2); }
  .result-row:hover { background: var(--accent-10); }

  /* ============================================================
     DETAILS / SUMMARY
     ============================================================ */
  details > summary {
    cursor: pointer;
    color: var(--accent);
    font-size: 0.75rem;
    font-weight: 500;
    list-style: none;
    user-select: none;
  }
  details > summary:hover { color: var(--accent-h); }
  details > summary::-webkit-details-marker { display: none; }

  /* ============================================================
     THEME SWITCHER DOTS
     ============================================================ */
  .theme-dot {
    width: 14px;
    height: 14px;
    border-radius: 9999px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .theme-dot:hover { transform: scale(1.2); }
  .theme-dot.active { border-color: var(--text); transform: scale(1.15); }

  /* ============================================================
     UTILITY ALIASES
     ============================================================ */
  .text-accent  { color: var(--accent); }
  .text-muted   { color: var(--muted); }
  .text-main    { color: var(--text); }
  .bg-surface   { background: var(--surface); }
  .bg-surface-2 { background: var(--surface-2); }
  .border-theme { border-color: var(--border); }
  .divider      { border-color: var(--border); }
</style>

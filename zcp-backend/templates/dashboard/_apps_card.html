{% for app in apps %}
  <div class="{% if not forloop.last %}pb-5 mb-5 border-b divider{% endif %}">
    <div class="flex items-start justify-between mb-4">
      <div>
        <p class="text-sm font-semibold text-main">{{ app.app_name }}</p>
        <p class="text-xs text-muted font-mono mt-0.5">{{ app.created_at|date:"Y-m-d H:i" }}</p>
      </div>
      <span class="badge ml-3
        {% if app.status == 'ready' %}badge-success
        {% elif app.status == 'deploying' %}badge-warn
        {% elif app.status == 'error' %}badge-error
        {% else %}badge-neutral{% endif %}">
        {{ app.status }}
      </span>
    </div>

    {% if app.service_urls %}
      <div class="space-y-2">
        {% for svc_id, url in app.service_urls.items %}
          <div class="flex items-center gap-3 p-2.5 rounded-lg" style="background:var(--surface-2);border:1px solid var(--border)">
            <span class="text-xs font-medium text-muted w-16 flex-shrink-0">{{ svc_id }}</span>
            <a href="{{ url }}" target="_blank" rel="noopener noreferrer"
               class="font-mono text-xs text-accent hover:opacity-80 break-all flex-1 flex items-center gap-1.5">
              <span>{{ url }}</span>
              <svg class="w-3 h-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
              </svg>
            </a>
          </div>
        {% endfor %}
      </div>
    {% endif %}
  </div>
{% empty %}
  <p class="text-sm text-muted">No apps deployed yet.</p>
{% endfor %}

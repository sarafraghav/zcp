{% if error %}
  <div class="alert-error flex items-start gap-2.5">
    <svg class="w-4 h-4 flex-shrink-0 mt-0.5" style="color:var(--e-tx)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
    </svg>
    <span>{{ error }}</span>
  </div>
{% elif columns %}
  <div class="overflow-auto rounded-lg" style="border:1px solid var(--border)">
    <table class="text-xs w-full border-collapse">
      <thead>
        <tr style="background:var(--surface-2);border-bottom:1px solid var(--border)">
          {% for col in columns %}
            <th class="text-left font-semibold text-muted px-3 py-2 whitespace-nowrap">{{ col }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
          <tr class="result-row" style="border-bottom:1px solid var(--border)">
            {% for cell in row %}
              <td class="px-3 py-1.5 text-main font-mono whitespace-nowrap">{{ cell }}</td>
            {% endfor %}
          </tr>
        {% empty %}
          <tr><td colspan="{{ columns|length }}" class="px-3 py-4 text-muted text-center">No rows returned.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <p class="text-xs text-muted mt-1.5 text-right font-mono">{{ row_count }} row{{ row_count|pluralize }}</p>
{% else %}
  <p class="text-xs text-muted">No results.</p>
{% endif %}

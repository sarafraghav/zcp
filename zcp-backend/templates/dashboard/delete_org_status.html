{% extends "base.html" %}
{% block title %}Deleting Organization — ZCP{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto mt-16">
  <div class="text-center mb-8">
    <div class="w-10 h-10 rounded-xl mx-auto mb-4 flex items-center justify-center"
         style="background:var(--e-bg);border:1px solid var(--e-bd)">
      <svg class="w-5 h-5" style="color:var(--e-tx)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
      </svg>
    </div>
    <h1 class="text-2xl font-semibold text-main">Deleting {{ org_name }}</h1>
    <p class="text-sm text-muted mt-1">Removing all provisioned resources…</p>
  </div>

  <div
    hx-get="{% url 'dashboard:org-delete-status' org_id %}"
    hx-trigger="load, every 2s"
    hx-swap="outerHTML"
  >
    {% include "dashboard/_delete_status_partial.html" %}
  </div>
</div>
{% endblock %}
